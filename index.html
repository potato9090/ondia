function renderQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((item, i) => {
        if (item.type === "header") {
            container.innerHTML += `<h2>${item.topic}</h2>`;
            return;
        }

        let html = `<div class="q-block"><span class="q-text">${item.q}</span>`;
        
        if (item.type === "mc") {
            html += `<div class="options">`;
            item.opts.forEach((opt, idx) => {
                html += `<label><input type="radio" name="q${i}" value="${opt[0]}"> ${opt}</label>`;
            });
            html += `</div>`;
        } else if (item.type === "tf") {
            html += `<div style="padding: 10px; border: 1px solid #eee; border-radius: 5px;">
                        <p style="font-size:0.9rem; color:#666">Nhập đáp án (ví dụ: a-Đ, b-S...)</p>
                        <input type="text" class="sa-input" id="tf${i}" placeholder="a-..., b-...">
                     </div>`;
        } else if (item.type === "sa") {
            html += `<input type="text" class="sa-input" id="sa${i}" maxlength="4" placeholder="Nhập số...">`;
        }

        html += `<div class="ans-box" id="ans${i}">Đáp án: ${item.a}</div>
                 <button class="btn-check" onclick="showAns(${i})">Kiểm tra</button></div>`;
        container.innerHTML += html;
    });
}

function showAns(id) {
    document.getElementById(`ans${id}`).style.display = 'block';
}

function toggleAll() {
    const boxes = document.querySelectorAll('.ans-box');
    const isVisible = boxes[0].style.display === 'block';
    boxes.forEach(box => box.style.display = isVisible ? 'none' : 'block');
}

renderQuiz();
</script>
